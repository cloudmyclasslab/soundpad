<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>사운드 패드 Beta</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body { background: #0A0A0F; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; overflow: hidden; height: 100dvh; }
  @keyframes blink  { from { opacity:1 } to { opacity:0.2 } }
  @keyframes slideUp { from { transform:translateY(100%) } to { transform:translateY(0) } }
  @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
  @keyframes toastIn { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
  input[type=range] { -webkit-appearance:none; width:100%; height:4px; border-radius:2px; background:#2a2a3e; outline:none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:#4CC9F0; cursor:pointer; }
  input[type=text] { background:#1a1a2e; border:1px solid #2a2a3e; color:#fff; border-radius:8px; padding:10px 12px; font-size:14px; width:100%; outline:none; }
  input[type=text]:focus { border-color:#4CC9F0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

// ── IndexedDB helpers ──────────────────────────────────────────
const DB_NAME = 'soundpad_v1';
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('data');
    r.onsuccess = e => res(e.target.result);
    r.onerror = e => rej(e.target.error);
  });
}
async function dbPut(key, val) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('data', 'readwrite');
    tx.objectStore('data').put(val, key);
    tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
  });
}
async function dbGet(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('data', 'readonly');
    const r = tx.objectStore('data').get(key);
    r.onsuccess = e => res(e.target.result); r.onerror = e => rej(e.target.error);
  });
}
async function dbDel(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('data', 'readwrite');
    tx.objectStore('data').delete(key);
    tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
  });
}
async function dbClearAll() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('data', 'readwrite');
    tx.objectStore('data').clear();
    tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
  });
}

// ── Constants ──────────────────────────────────────────────────
const MIN_GRID = 560, GAP = 10;
const BASE_COLORS = [
  '#FF4D6D','#FF6B35','#FFB703','#06D6A0','#4CC9F0','#4361EE','#9B5DE5','#F72585',
  '#E63946','#2EC4B6','#CBFF8C','#FF9F1C','#A8DADC','#457B9D','#E9C46A','#F4A261',
  '#C77DFF','#52B788','#FF6B9D','#00B4D8','#FFC8DD','#BDE0FE','#CAFFBF','#FDFFB6',
];
const BASE_EMOJIS = [
  '🐶','🐱','🐸','🎵','🥁','🎹','🎸','🎺','👏','💨','🌊','🔔',
  '⭐','🎯','🎪','🎨','🦁','🐯','🦊','🐧','🌈','🔥','💧','🌿',
];
const padColor = i => BASE_COLORS[i % BASE_COLORS.length];
const padEmoji = i => BASE_EMOJIS[i % BASE_EMOJIS.length];

function getMimeType() {
  const types = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
  return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
}

// ── PadVideo ───────────────────────────────────────────────────
function PadVideo({ url, volume, onEnd }) {
  const ref = useRef(null);
  useEffect(() => {
    const v = ref.current;
    if (!v) return;
    v.volume = Math.max(0, Math.min(1, volume));
    v.play().catch(console.error);
    v.onended = onEnd;
  }, []);
  return (
    <video ref={ref} src={url} playsInline style={{
      position:'absolute', inset:0, width:'100%', height:'100%',
      objectFit:'cover', borderRadius:14, zIndex:1,
    }} />
  );
}

// ── Toast ──────────────────────────────────────────────────────
function Toast({ msg }) {
  return (
    <div style={{
      position:'fixed', bottom:32, left:'50%', transform:'translateX(-50%)',
      background:'#06D6A0', color:'#000', padding:'10px 24px',
      borderRadius:50, fontWeight:700, fontSize:13, zIndex:500,
      animation:'toastIn 0.3s ease-out',
      boxShadow:'0 4px 20px rgba(6,214,160,0.4)',
    }}>{msg}</div>
  );
}

// ── Label/Volume Edit Modal ────────────────────────────────────
function PadEditModal({ pad, idx, onSave, onClose }) {
  const [label, setLabel] = useState(pad?.label || '');
  const [vol, setVol] = useState(pad?.volume !== undefined ? pad.volume : 1);
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:400 }} />
      <div style={{
        position:'fixed', top:'50%', left:'50%', transform:'translate(-50%,-50%)',
        background:'#111128', borderRadius:20, padding:28, width:300, zIndex:401,
        animation:'fadeIn 0.2s ease-out',
      }}>
        <div style={{ color:'#fff', fontWeight:800, fontSize:15, marginBottom:20 }}>
          ✏️ 패드 편집
        </div>
        <div style={{ marginBottom:20 }}>
          <div style={{ color:'#666', fontSize:11, fontWeight:700, letterSpacing:1, marginBottom:8 }}>패드 이름</div>
          <input
            type="text"
            value={label}
            onChange={e => setLabel(e.target.value)}
            placeholder="이름 입력..."
            maxLength={12}
            autoFocus
          />
        </div>
        <div style={{ marginBottom:28 }}>
          <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
            <span style={{ color:'#666', fontSize:11, fontWeight:700, letterSpacing:1 }}>패드 볼륨</span>
            <span style={{ color:'#4CC9F0', fontSize:12, fontWeight:700 }}>{Math.round(vol * 100)}%</span>
          </div>
          <input type="range" min={0} max={1} step={0.05} value={vol} onChange={e => setVol(+e.target.value)} />
        </div>
        <div style={{ display:'flex', gap:10 }}>
          <button onClick={onClose} style={{
            flex:1, padding:'10px 0', borderRadius:10, border:'1px solid #2a2a3e',
            background:'#1a1a2e', color:'#aaa', fontWeight:700, cursor:'pointer', fontSize:13,
          }}>취소</button>
          <button onClick={() => onSave(label.trim(), vol)} style={{
            flex:1, padding:'10px 0', borderRadius:10, border:'none',
            background:'linear-gradient(135deg,#4CC9F0,#4361EE)', color:'#fff',
            fontWeight:700, cursor:'pointer', fontSize:13,
          }}>저장</button>
        </div>
      </div>
    </>
  );
}

// ── Settings Panel ─────────────────────────────────────────────
function SettingsPanel({ open, onClose, settings, update, onReset }) {
  const panelRef = React.useRef(null);
  const dragRef = React.useRef({ dragging: false, startY: 0, curY: 0 });
  const [translateY, setTranslateY] = React.useState(0);

  React.useEffect(() => { if (open) setTranslateY(0); }, [open]);

  const onHandleDown = (e) => {
    dragRef.current = { dragging: true, startY: e.clientY || e.touches?.[0]?.clientY || 0, curY: 0 };
  };
  const onHandleMove = (e) => {
    if (!dragRef.current.dragging) return;
    const y = (e.clientY || e.touches?.[0]?.clientY || 0) - dragRef.current.startY;
    if (y < 0) return;
    dragRef.current.curY = y;
    setTranslateY(y);
  };
  const onHandleUp = () => {
    if (!dragRef.current.dragging) return;
    dragRef.current.dragging = false;
    if (dragRef.current.curY > 120) { onClose(); setTranslateY(0); }
    else setTranslateY(0);
  };

  if (!open) return null;
  const { cols, rows, maxRecMs, globalVolume, cameraFacing } = settings;

  const sBtn = active => ({
    flex:1, padding:'8px 0', borderRadius:8, border:'none', cursor:'pointer',
    fontWeight:700, fontSize:12,
    background: active ? '#4CC9F0' : '#1A1A2E',
    color: active ? '#000' : '#555',
  });
  const stepBtn = disabled => ({
    width:36, height:36, borderRadius:8, border:'1px solid #2a2a3e',
    background:'#1A1A2E', color: disabled ? '#333' : '#fff',
    fontSize:20, cursor: disabled ? 'default' : 'pointer',
    display:'flex', alignItems:'center', justifyContent:'center',
  });
  const section = { color:'#666', fontSize:11, fontWeight:700, letterSpacing:1, marginBottom:10 };
  const rowS = { display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24 };
  const val = { color:'#fff', fontWeight:800, fontSize:18, minWidth:36, textAlign:'center' };

  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:200 }} />
      <div
        ref={panelRef}
        onMouseMove={onHandleMove} onMouseUp={onHandleUp}
        onTouchMove={onHandleMove} onTouchEnd={onHandleUp}
        style={{
          position:'fixed', bottom:0, left:0, right:0,
          background:'#111128', borderRadius:'20px 20px 0 0',
          padding:'24px 24px 44px', zIndex:201,
          animation: translateY === 0 ? 'slideUp 0.25s ease-out' : 'none',
          transform: `translateY(${translateY}px)`,
          transition: dragRef.current.dragging ? 'none' : 'transform 0.25s ease-out',
          maxHeight:'90vh', overflowY:'auto',
        }}>
        {/* 드래그 핸들 */}
        <div
          onMouseDown={onHandleDown} onTouchStart={onHandleDown}
          style={{ width:'100%', padding:'0 0 20px', cursor:'grab', touchAction:'none' }}
        >
          <div style={{ width:40, height:4, background:'#444', borderRadius:2, margin:'0 auto' }} />
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:28 }}>
          <span style={{ color:'#fff', fontWeight:800, fontSize:16 }}>⚙️ 환경설정</span>
          <button onClick={onClose} style={{ background:'none', border:'none', color:'#555', fontSize:20, cursor:'pointer' }}>✕</button>
        </div>

        {/* 버튼 배치 */}
        <div style={{ marginBottom:24 }}>
          <div style={section}>버튼 배치</div>
          <div style={rowS}>
            <span style={{ color:'#aaa', fontSize:13 }}>가로 열 수</span>
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>
              <button style={stepBtn(cols<=1)} onClick={() => cols > 1 && update('cols', cols-1)}>−</button>
              <span style={val}>{cols}</span>
              <button style={stepBtn(cols>=8)} onClick={() => cols < 8 && update('cols', cols+1)}>+</button>
            </div>
          </div>
          <div style={{ ...rowS, marginBottom:0 }}>
            <span style={{ color:'#aaa', fontSize:13 }}>세로 행 수</span>
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>
              <button style={stepBtn(rows<=1)} onClick={() => rows > 1 && update('rows', rows-1)}>−</button>
              <span style={val}>{rows}</span>
              <button style={stepBtn(rows>=6)} onClick={() => rows < 6 && update('rows', rows+1)}>+</button>
            </div>
          </div>
          <div style={{ color:'#444', fontSize:11, textAlign:'right', marginTop:8 }}>총 {cols*rows}개 패드</div>
        </div>

        {/* 녹음 시간 */}
        <div style={{ marginBottom:24 }}>
          <div style={section}>최대 녹음 시간</div>
          <div style={{ display:'flex', gap:8 }}>
            {[1000, 3000, 5000].map(ms => (
              <button key={ms} style={sBtn(maxRecMs===ms)} onClick={() => update('maxRecMs', ms)}>
                {ms/1000}초
              </button>
            ))}
          </div>
        </div>

        {/* 전체 볼륨 */}
        <div style={{ marginBottom:24 }}>
          <div style={{ display:'flex', justifyContent:'space-between', marginBottom:10 }}>
            <span style={section}>전체 볼륨</span>
            <span style={{ color:'#4CC9F0', fontSize:12, fontWeight:700 }}>{Math.round(globalVolume*100)}%</span>
          </div>
          <input type="range" min={0} max={1} step={0.05}
            value={globalVolume}
            onChange={e => update('globalVolume', +e.target.value)}
          />
        </div>

        {/* 카메라 방향 */}
        <div style={{ marginBottom:32 }}>
          <div style={section}>카메라</div>
          <div style={{ display:'flex', gap:8 }}>
            <button style={sBtn(cameraFacing==='user')} onClick={() => update('cameraFacing','user')}>📱 전면 카메라</button>
            <button style={sBtn(cameraFacing==='environment')} onClick={() => update('cameraFacing','environment')}>📷 후면 카메라</button>
          </div>
        </div>

        {/* 전체 초기화 */}
        <button
          onClick={onReset}
          style={{
            width:'100%', padding:'14px 0', borderRadius:12, border:'none',
            background:'#2a0a0a', color:'#FF4D6D', fontWeight:700, fontSize:14,
            cursor:'pointer', letterSpacing:0.5,
          }}
        >🗑 전체 초기화</button>
      </div>
    </>
  );
}

// ── App ────────────────────────────────────────────────────────
function App() {
  // Grid & settings
  const [cols, setCols] = useState(4);
  const [rows, setRows] = useState(3);
  const [maxRecMs, setMaxRecMs] = useState(3000);
  const [globalVolume, setGlobalVolume] = useState(1);
  const [cameraFacing, setCameraFacing] = useState('user');
  const [gridWidth, setGridWidth] = useState(MIN_GRID);

  // Pads: { url, thumb, label, volume }
  const [pads, setPads] = useState(() => Array(4*3).fill(null));

  // UI state
  const [mode, setMode] = useState('play');
  const [recordingIdx, setRecordingIdx] = useState(null);
  const [playKeys, setPlayKeys] = useState({});
  const [cameraReady, setCameraReady] = useState(false);
  const [recProgress, setRecProgress] = useState(0);
  const [showSettings, setShowSettings] = useState(false);
  const [editPad, setEditPad] = useState(null); // {idx}
  const [toast, setToast] = useState(null);
  const [saving, setSaving] = useState(false);
  const [loading, setLoading] = useState(true);

  // Refs
  const headerRef = useRef(null);
  const mrRef = useRef(null);
  const chunksRef = useRef([]);
  const streamRef = useRef(null);
  const cameraVideoRef = useRef(null);
  const timerRef = useRef(null);
  const progressRef = useRef(null);
  const toastTimerRef = useRef(null);

  // ── Load from DB on mount ──
  useEffect(() => {
    (async () => {
      try {
        const meta = await dbGet('metadata');
        if (!meta) { setLoading(false); return; }

        const { cols: c, rows: r, maxRecMs: mr, globalVolume: gv,
                cameraFacing: cf, padMeta } = meta;

        if (c) setCols(c);
        if (r) setRows(r);
        if (mr) setMaxRecMs(mr);
        if (gv !== undefined) setGlobalVolume(gv);
        if (cf) setCameraFacing(cf);

        const total = (c||4) * (r||3);
        const newPads = Array(total).fill(null);
        for (let i = 0; i < total; i++) {
          if (padMeta && padMeta[i]) {
            const blob = await dbGet(`blob_${i}`);
            if (blob) {
              newPads[i] = { url: URL.createObjectURL(blob), ...padMeta[i] };
            }
          }
        }
        setPads(newPads);
      } catch(e) { console.error('Load error:', e); }
      setLoading(false);
    })();

    return () => {
      clearTimeout(timerRef.current);
      clearInterval(progressRef.current);
      streamRef.current?.getTracks().forEach(t => t.stop());
    };
  }, []);

  // ── Attach stream to video element after modal renders ──
  useEffect(() => {
    if (cameraReady && cameraVideoRef.current && streamRef.current) {
      cameraVideoRef.current.srcObject = streamRef.current;
      cameraVideoRef.current.play().catch(console.error);
    }
  }, [cameraReady]);

  // ── Grid size ──
  useEffect(() => {
    const compute = () => {
      const availW = window.innerWidth - 24;
      const headerH = headerRef.current ? headerRef.current.offsetHeight : 70;
      const availH = window.innerHeight - headerH - 16; // 16px bottom padding
      const cellByH = (availH - GAP*(rows-1)) / rows;
      const wByH = cellByH * cols + GAP*(cols-1);
      setGridWidth(Math.min(availW, Math.max(Math.min(MIN_GRID, availW), wByH)));
    };
    compute();
    window.addEventListener('resize', compute);
    window.addEventListener('orientationchange', () => setTimeout(compute, 100));
    return () => { window.removeEventListener('resize', compute); window.removeEventListener('orientationchange', compute); };
  }, [cols, rows]);  // headerRef is stable, no need to add

  // ── Resize pads array when grid changes ──
  useEffect(() => {
    const total = cols * rows;
    setPads(prev => {
      const next = Array(total).fill(null);
      for (let i = 0; i < Math.min(prev.length, total); i++) next[i] = prev[i];
      return next;
    });
  }, [cols, rows]);

  // ── Settings updater ──
  const updateSetting = (key, val) => {
    if (key === 'cols') setCols(val);
    else if (key === 'rows') setRows(val);
    else if (key === 'maxRecMs') setMaxRecMs(val);
    else if (key === 'globalVolume') setGlobalVolume(val);
    else if (key === 'cameraFacing') setCameraFacing(val);
  };

  // ── Toast helper ──
  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setToast(null), 2000);
  };

  // ── Save ──
  const handleSave = async () => {
    if (saving) return;
    setSaving(true);
    try {
      const padMeta = pads.map(p => p ? { thumb: p.thumb, label: p.label, volume: p.volume } : null);
      await dbPut('metadata', { cols, rows, maxRecMs, globalVolume, cameraFacing, padMeta });
      for (let i = 0; i < pads.length; i++) {
        if (pads[i]?.url) {
          const blob = await fetch(pads[i].url).then(r => r.blob());
          await dbPut(`blob_${i}`, blob);
        } else {
          await dbDel(`blob_${i}`);
        }
      }
      showToast('💾 저장됐습니다');
    } catch(e) {
      console.error(e);
      showToast('저장 실패');
    }
    setSaving(false);
  };

  // ── Reset ──
  const handleReset = async () => {
    if (!window.confirm('모든 패드를 초기화할까요?')) return;
    await dbClearAll();
    setPads(Array(cols * rows).fill(null));
    setPlayKeys({});
    setShowSettings(false);
    showToast('초기화됐습니다');
  };

  // ── Record ──
  // 녹화된 blob의 중간 지점 프레임을 썸네일로 추출
  function captureMidFrame(url, cb) {
    const vid = document.createElement('video');
    vid.src = url;
    vid.muted = true;
    vid.preload = 'metadata';
    vid.onloadedmetadata = () => { vid.currentTime = Math.max(0.1, vid.duration / 2); };
    vid.onseeked = () => {
      try {
        const c = document.createElement('canvas');
        c.width = vid.videoWidth || 320;
        c.height = vid.videoHeight || 240;
        c.getContext('2d').drawImage(vid, 0, 0, c.width, c.height);
        cb(c.toDataURL('image/jpeg', 0.85));
      } catch { cb(null); }
      vid.src = '';
    };
    vid.onerror = () => cb(null);
  }

  const stopRecord = useCallback(() => {
    clearTimeout(timerRef.current);
    clearInterval(progressRef.current);
    if (mrRef.current?.state !== 'inactive') mrRef.current.stop();
  }, []);

  const startRecord = useCallback(async (idx) => {
    if (recordingIdx !== null) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: cameraFacing }, audio: true,
      });
      streamRef.current = stream;
      chunksRef.current = [];

      const mimeType = getMimeType();
      const mr = new MediaRecorder(stream, mimeType ? { mimeType } : {});
      mrRef.current = mr;
      mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        // 스트림 먼저 종료 후 중간 프레임 비동기 추출
        stream.getTracks().forEach(t => t.stop());
        streamRef.current = null;
        setCameraReady(false);
        setRecordingIdx(null);
        setRecProgress(0);
        clearInterval(progressRef.current);
        // 일단 thumb 없이 저장 후, 추출 완료되면 업데이트
        setPads(p => {
          const n = [...p];
          const existing = n[idx];
          n[idx] = { url, thumb: null, label: existing?.label || '', volume: existing?.volume !== undefined ? existing.volume : 1 };
          return n;
        });
        captureMidFrame(url, thumb => {
          if (thumb) setPads(p => { const n = [...p]; if (n[idx]?.url === url) n[idx] = { ...n[idx], thumb }; return n; });
        });
      };

      mr.start(100);
      setRecordingIdx(idx);
      setCameraReady(true);

      let elapsed = 0;
      progressRef.current = setInterval(() => {
        elapsed += 100;
        setRecProgress(elapsed / maxRecMs);
        if (elapsed >= maxRecMs) clearInterval(progressRef.current);
      }, 100);
      timerRef.current = setTimeout(() => stopRecord(), maxRecMs);
    } catch(e) {
      console.error(e);
      setRecordingIdx(null);
      setCameraReady(false);
    }
  }, [recordingIdx, cameraFacing, maxRecMs]);

  // ── Play ──
  const playPad = useCallback((idx) => {
    if (!pads[idx]) return;
    setPlayKeys(k => ({ ...k, [idx]: (k[idx] || 0) + 1 }));
  }, [pads]);

  const stopPad = useCallback((idx) => {
    setPlayKeys(k => { const n = { ...k }; delete n[idx]; return n; });
  }, []);

  const deletePad = (e, idx) => {
    e.stopPropagation();
    stopPad(idx);
    setPads(p => { const n = [...p]; n[idx] = null; return n; });
  };

  const openEdit = (e, idx) => {
    e.stopPropagation();
    setEditPad({ idx });
  };

  const saveEdit = (label, volume) => {
    const { idx } = editPad;
    setPads(p => { const n = [...p]; if (n[idx]) n[idx] = { ...n[idx], label, volume }; return n; });
    setEditPad(null);
  };

  const handlePad = (idx) => {
    if (mode === 'record') startRecord(idx);
    else playPad(idx);
  };

  const total = cols * rows;

  if (loading) {
    return (
      <div style={{ minHeight:'100dvh', display:'flex', alignItems:'center', justifyContent:'center', color:'#555', fontSize:14 }}>
        불러오는 중...
      </div>
    );
  }

  return (
    <div style={{ height:'100dvh', display:'flex', flexDirection:'column', alignItems:'center', padding:'0 12px 0', overflow:'hidden' }}>

      {/* Header */}
      <div ref={headerRef} style={{ width:'100%', maxWidth:gridWidth, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'16px 0 14px', gap:8, flexShrink:0 }}>
        <div>
          <div style={{ color:'#fff', fontSize:18, fontWeight:800, letterSpacing:-0.5 }}>🎛 사운드 패드 <span style={{fontSize:11,color:'#4CC9F0',fontWeight:700,verticalAlign:'middle'}}>Beta</span></div>
          <div style={{ color:'#555', fontSize:10, marginTop:2 }}>
            {mode === 'record' ? '패드를 눌러 녹음' : '패드를 눌러 재생'}
          </div>
        </div>
        <div style={{ display:'flex', gap:7, alignItems:'center' }}>
          <button onClick={handleSave} disabled={saving} style={{
            height:38, padding:'0 14px', borderRadius:10, border:'1px solid #2a2a3e',
            background:'#1A1A2E', color: saving ? '#444' : '#06D6A0',
            fontWeight:700, fontSize:12, cursor: saving ? 'default' : 'pointer',
          }}>{saving ? '저장 중...' : '💾 저장'}</button>
          <button onClick={() => setShowSettings(true)} style={{
            width:38, height:38, borderRadius:10, border:'1px solid #2a2a3e',
            background:'#1A1A2E', color:'#aaa', fontSize:16,
            cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
          }}>⚙️</button>
          <button onClick={() => setMode(m => m === 'play' ? 'record' : 'play')} style={{
            height:38, padding:'0 14px', borderRadius:50, border:'none',
            background: mode === 'record'
              ? 'linear-gradient(135deg,#FF4D6D,#FF6B35)'
              : 'linear-gradient(135deg,#06D6A0,#4CC9F0)',
            color:'#fff', fontWeight:700, fontSize:12, cursor:'pointer',
            boxShadow: mode === 'record' ? '0 0 16px rgba(255,77,109,0.5)' : '0 0 16px rgba(6,214,160,0.4)',
          }}>{mode === 'record' ? '🔴 녹음' : '▶ 재생'}</button>
        </div>
      </div>

      {/* Grid */}
      <div style={{ display:'grid', gridTemplateColumns:`repeat(${cols}, 1fr)`, gap:GAP, width:gridWidth, transition:'width 0.3s ease' }}>
        {Array.from({ length: total }, (_, i) => {
          const pad = pads[i];
          const isRec = recordingIdx === i;
          const playKey = playKeys[i];
          const isPlay = !!playKey;
          const color = padColor(i);
          const padVol = (pad?.volume !== undefined ? pad.volume : 1) * globalVolume;

          return (
            <div key={i} onPointerDown={() => handlePad(i)} style={{
              aspectRatio:'1', borderRadius:16,
              background: pad?.thumb && !isPlay ? `url(${pad.thumb}) center/cover` : `${color}22`,
              border: isRec ? `2.5px solid #FF4D6D` : isPlay ? `2.5px solid ${color}` : `2px solid ${color}44`,
              display:'flex', alignItems:'center', justifyContent:'center',
              cursor:'pointer', position:'relative', overflow:'hidden',
              transition:'transform 0.08s, box-shadow 0.08s',
              transform: isPlay ? 'scale(0.93)' : 'scale(1)',
              boxShadow: isPlay ? `0 0 28px ${color}aa` : isRec ? '0 0 24px rgba(255,77,109,0.6)' : 'none',
              touchAction:'none',
            }}>
              {pad && isPlay && <PadVideo key={playKey} url={pad.url} volume={padVol} onEnd={() => stopPad(i)} />}

              {isPlay && <div style={{ position:'absolute', inset:0, zIndex:2, pointerEvents:'none', background:`linear-gradient(to top, ${color}55 0%, transparent 60%)`, borderRadius:14 }} />}

              {!pad && (
                <div style={{ textAlign:'center', position:'relative', zIndex:2 }}>
                  <div style={{ fontSize: cols >= 6 ? 18 : 26 }}>{padEmoji(i)}</div>
                  {mode === 'record' && <div style={{ color, fontSize:9, fontWeight:700, marginTop:3 }}>탭하여 녹음</div>}
                </div>
              )}

              {pad && !isPlay && !isRec && <div style={{ position:'absolute', inset:0, zIndex:2, background:'linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 55%)', borderRadius:14 }} />}

              {/* REC badge */}
              {isRec && (
                <div style={{ position:'absolute', top:6, left:6, zIndex:5, display:'flex', alignItems:'center', gap:3, background:'rgba(0,0,0,0.8)', borderRadius:20, padding:'2px 7px' }}>
                  <div style={{ width:6, height:6, borderRadius:'50%', background:'#FF4D6D', animation:'blink 0.5s alternate infinite' }} />
                  <span style={{ color:'#FF4D6D', fontSize:9, fontWeight:700 }}>REC</span>
                </div>
              )}

              {/* Record mode controls */}
              {pad && mode === 'record' && !isRec && (
                <>
                  <button onPointerDown={e => deletePad(e, i)} style={{
                    position:'absolute', top:5, right:5, zIndex:10, width:20, height:20, borderRadius:'50%',
                    background:'rgba(0,0,0,0.8)', border:'none', color:'#fff', fontSize:11, cursor:'pointer',
                    display:'flex', alignItems:'center', justifyContent:'center',
                  }}>✕</button>
                  <button onPointerDown={e => openEdit(e, i)} style={{
                    position:'absolute', top:5, left:5, zIndex:10, width:20, height:20, borderRadius:'50%',
                    background:'rgba(0,0,0,0.8)', border:'none', color:'#4CC9F0', fontSize:11, cursor:'pointer',
                    display:'flex', alignItems:'center', justifyContent:'center',
                  }}>✏️</button>
                </>
              )}

              {/* Label */}
              {pad?.label && !isRec && (
                <div style={{
                  position:'absolute', bottom:0, left:0, right:0, zIndex:3,
                  padding:'4px 6px', textAlign:'center',
                  color:'#fff', fontSize: cols >= 6 ? 9 : 11, fontWeight:700,
                  textShadow:'0 1px 4px rgba(0,0,0,0.8)',
                  whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                }}>{pad.label}</div>
              )}
            </div>
          );
        })}
      </div>


      {/* Camera Modal */}
      {cameraReady && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.92)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:300, gap:16 }}>
          <div style={{ color:'#FF4D6D', fontWeight:800, fontSize:15, letterSpacing:2 }}>🔴 녹음 중</div>
          <video ref={cameraVideoRef} muted autoPlay playsInline style={{
            width:280, height:210, borderRadius:16, border:'2px solid #FF4D6D', background:'#000',
            objectFit:'cover', boxShadow:'0 0 40px rgba(255,77,109,0.4)',
            transform: cameraFacing === 'user' ? 'scaleX(-1)' : 'none',
          }} />
          <div style={{ width:280, height:5, background:'#222', borderRadius:3, overflow:'hidden' }}>
            <div style={{ height:'100%', width:`${recProgress*100}%`, background:'linear-gradient(90deg,#FF4D6D,#FF6B35)', borderRadius:3, transition:'width 0.1s linear' }} />
          </div>
          <div style={{ color:'#555', fontSize:11 }}>{maxRecMs/1000}초 최대 · 자동으로 저장됩니다</div>
          <button onClick={stopRecord} style={{
            padding:'12px 32px', borderRadius:50, border:'none',
            background:'linear-gradient(135deg,#FF4D6D,#FF6B35)',
            color:'#fff', fontWeight:800, fontSize:14, cursor:'pointer',
            boxShadow:'0 0 24px rgba(255,77,109,0.5)',
          }}>⏹ 녹음 완료</button>
        </div>
      )}

      {/* Settings */}
      <SettingsPanel
        open={showSettings}
        onClose={() => setShowSettings(false)}
        settings={{ cols, rows, maxRecMs, globalVolume, cameraFacing }}
        update={updateSetting}
        onReset={handleReset}
      />

      {/* Pad edit modal */}
      {editPad && (
        <PadEditModal
          pad={pads[editPad.idx]}
          idx={editPad.idx}
          onSave={saveEdit}
          onClose={() => setEditPad(null)}
        />
      )}

      {/* Toast */}
      {toast && <Toast msg={toast} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
