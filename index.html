<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

// ── DB ────────────────────────────────────────────────────────
const DB_NAME = 'classpad_v1';
let _db = null;
function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('data');
    r.onsuccess = e => { _db = e.target.result; res(_db); };
    r.onerror = e => rej(e.target.error);
  });
}
const dbPut   = async (k,v) => { const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('data','readwrite'); tx.objectStore('data').put(v,k); tx.oncomplete=res; tx.onerror=e=>rej(e.target.error); }); };
const dbGet   = async k     => { const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('data','readonly'); const r=tx.objectStore('data').get(k); r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e.target.error); }); };
const dbDel   = async k     => { const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('data','readwrite'); tx.objectStore('data').delete(k); tx.oncomplete=res; tx.onerror=e=>rej(e.target.error); }); };
const dbClear = async ()    => { const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('data','readwrite'); tx.objectStore('data').clear(); tx.oncomplete=res; tx.onerror=e=>rej(e.target.error); }); };

// ── Helpers ───────────────────────────────────────────────────
const GAP = 10;
const COLORS = ['#FF4D6D','#FF6B35','#FFB703','#06D6A0','#4CC9F0','#4361EE','#9B5DE5','#F72585','#E63946','#2EC4B6','#CBFF8C','#FF9F1C','#A8DADC','#457B9D','#E9C46A','#F4A261','#C77DFF','#52B788','#FF6B9D','#00B4D8','#FFC8DD','#BDE0FE','#CAFFBF','#FDFFB6'];
const EMOJIS = ['🐶','🐱','🐸','🎵','🥁','🎹','🎸','🎺','👏','💨','🌊','🔔','⭐','🎯','🎪','🎨','🦁','🐯','🦊','🐧','🌈','🔥','💧','🌿'];
const pColor = i => COLORS[i % COLORS.length];
const pEmoji = i => EMOJIS[i % EMOJIS.length];

function getVideoMime() {
  return ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'].find(t=>MediaRecorder.isTypeSupported(t)) || '';
}
function getAudioMime() {
  return ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus'].find(t=>MediaRecorder.isTypeSupported(t)) || '';
}

// Resize image file to max 480px, return data URL
function resizeImage(file, cb) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 480;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else        { w = Math.round(w * MAX / h); h = MAX; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(c.toDataURL('image/jpeg', 0.85));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Components ────────────────────────────────────────────────
function PadVideo({ url, volume, onEnd, trimStart, trimEnd }) {
  const ref = useRef(null);
  useEffect(() => {
    const v = ref.current; if (!v) return;
    v.volume = Math.max(0, Math.min(1, volume));
    if (trimStart) v.currentTime = trimStart;
    v.play().catch(console.error);
    v.ontimeupdate = () => { if (trimEnd && v.currentTime >= trimEnd) { v.pause(); onEnd(); } };
    v.onended = onEnd;
  }, []);
  return <video ref={ref} src={url} playsInline style={{ position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',borderRadius:14,zIndex:1 }} />;
}

function PadAudio({ url, volume, onEnd }) {
  useEffect(() => {
    const a = new Audio(url);
    a.volume = Math.max(0, Math.min(1, volume));
    a.play().catch(console.error);
    a.onended = onEnd;
    return () => { a.pause(); a.src = ''; };
  }, []);
  return null;
}

// ── Gaze Calibration ──────────────────────────────────────────
const CALIB_GRID = [
  [10,10],[50,10],[90,10],
  [10,50],[50,50],[90,50],
  [10,90],[50,90],[90,90],
];
const CLICKS_PER_PT = 5;
const DWELL_MS = 1500;

function CalibrationScreen({ onDone, onCancel, onCalibClick }) {
  const [cur,    setCur]    = React.useState(0);
  const [clicks, setClicks] = React.useState(0);

  const total = CALIB_GRID.length * CLICKS_PER_PT;
  const done  = cur * CLICKS_PER_PT + clicks;
  const pct   = done / total * 100;
  const pt    = CALIB_GRID[cur];

  const handleClick = (e) => {
    const sx = e.clientX ?? (window.innerWidth  * pt[0] / 100);
    const sy = e.clientY ?? (window.innerHeight * pt[1] / 100);
    // WebGazer에 클릭 포인트 기록
    try { window.webgazer?.recordScreenPosition(sx, sy, 'click'); } catch {}
    // 저장용 콜백
    onCalibClick?.(sx, sy);

    const nx = clicks + 1;
    if (nx >= CLICKS_PER_PT) {
      if (cur + 1 >= CALIB_GRID.length) { onDone(); }
      else { setCur(c => c+1); setClicks(0); }
    } else { setClicks(nx); }
  };

  return (
    <div onPointerDown={handleClick} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.97)',zIndex:800,cursor:'pointer',touchAction:'manipulation',userSelect:'none',WebkitUserSelect:'none'}}>
      {/* 안내 */}
      <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center',pointerEvents:'none',width:'80%'}}>
        <div style={{color:'#fff',fontWeight:800,fontSize:18,marginBottom:6}}>👁️ 시선 캘리브레이션</div>
        <div style={{color:'#aaa',fontSize:13,lineHeight:1.7}}>빨간 점을 바라보면서 탭하세요<br/>({cur+1} / {CALIB_GRID.length} 포인트, 각 {CLICKS_PER_PT}번)</div>
        <div style={{width:220,height:5,background:'#222',borderRadius:3,margin:'14px auto 0',overflow:'hidden'}}>
          <div style={{width:`${pct}%`,height:'100%',background:'linear-gradient(90deg,#4CC9F0,#4361EE)',borderRadius:3,transition:'width 0.1s'}} />
        </div>
      </div>
      {/* 캘리브레이션 점 */}
      <div style={{
        position:'absolute', left:`${pt[0]}%`, top:`${pt[1]}%`,
        transform:'translate(-50%,-50%)',
        width:44, height:44, borderRadius:'50%',
        background:`conic-gradient(#FF4D6D ${clicks/CLICKS_PER_PT*360}deg, #FF4D6D33 0deg)`,
        border:'2.5px solid #FF4D6D',
        boxShadow:'0 0 24px rgba(255,77,109,0.7)',
        pointerEvents:'none',
      }}>
        <div style={{position:'absolute',inset:6,borderRadius:'50%',background:'#FF4D6D',opacity:0.9}} />
      </div>
      <button onPointerDown={e=>{e.stopPropagation();onCancel();}} style={{position:'absolute',bottom:40,left:'50%',transform:'translateX(-50%)',padding:'10px 28px',borderRadius:50,border:'1px solid #333',background:'transparent',color:'#666',fontSize:13,cursor:'pointer'}}>취소</button>
    </div>
  );
}

// ── GazeLoadingScreen ─────────────────────────────────────────
function GazeLoadingScreen({ onCancel }) {
  const [dots, setDots] = React.useState('');
  React.useEffect(() => {
    const t = setInterval(() => setDots(d => d.length >= 3 ? '' : d + '.'), 500);
    return () => clearInterval(t);
  }, []);
  return <>
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.97)',zIndex:800,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20}}>
      <div style={{fontSize:48}}>👁️</div>
      <div style={{color:'#fff',fontWeight:800,fontSize:18}}>시선 처리 준비 중{dots}</div>
      <div style={{color:'#555',fontSize:13}}>카메라로 얼굴을 인식하고 있습니다</div>
      <div style={{width:48,height:48,border:'4px solid #1e1e3a',borderTop:'4px solid #4CC9F0',borderRadius:'50%',animation:'spin 1s linear infinite'}} />
      <button onPointerDown={onCancel} style={{marginTop:16,padding:'10px 28px',borderRadius:50,border:'1px solid #333',background:'transparent',color:'#666',fontSize:13,cursor:'pointer'}}>취소</button>
    </div>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
  </>;
}

// ── GazeStartModal ────────────────────────────────────────────
function GazeStartModal({ savedAt, screenW, screenH, onNew, onLoad, onDelete, onCancel }) {
  const fmtDate = ts => {
    const d = new Date(ts);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };
  const sameScreen = screenW === window.innerWidth && screenH === window.innerHeight;
  return <>
    <div onClick={onCancel} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:800}} />
    <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'#111128',borderRadius:20,padding:28,width:'min(320px,92vw)',zIndex:801,animation:'fadeIn 0.2s'}}>
      <div style={{color:'#fff',fontWeight:800,fontSize:15,marginBottom:6}}>👁️ 시선 트래킹 시작</div>
      <div style={{color:'#555',fontSize:12,marginBottom:20}}>저장된 캘리브레이션 데이터가 있습니다.</div>
      <div style={{background:'#0d0d1a',borderRadius:12,padding:'14px',marginBottom:16,border:'1px solid #1e1e3a'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <span style={{color:'#4CC9F0',fontSize:12,fontWeight:700}}>저장된 캘리브레이션</span>
          <button onClick={onDelete} style={{background:'none',border:'none',color:'#FF4D6D',fontSize:11,cursor:'pointer',fontWeight:700}}>삭제</button>
        </div>
        <div style={{color:'#aaa',fontSize:12}}>저장일시: {fmtDate(savedAt)}</div>
        <div style={{color:sameScreen?'#06D6A0':'#FFB703',fontSize:11,marginTop:4}}>
          {sameScreen ? '✓ 현재 화면 크기와 일치' : `⚠ 다른 화면 크기 (${screenW}×${screenH} → 자동 스케일링)`}
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <button onClick={onLoad} style={{padding:'13px 0',borderRadius:12,border:'none',background:'linear-gradient(135deg,#4CC9F0,#4361EE)',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer'}}>
          ⚡ 저장된 캘리브레이션 사용
        </button>
        <button onClick={onNew} style={{padding:'13px 0',borderRadius:12,border:'1px solid #2a2a3e',background:'#1a1a2e',color:'#aaa',fontWeight:700,fontSize:14,cursor:'pointer'}}>
          🎯 새로 캘리브레이션
        </button>
      </div>
      <button onClick={onCancel} style={{width:'100%',marginTop:12,padding:'10px 0',borderRadius:10,border:'none',background:'transparent',color:'#555',fontSize:13,cursor:'pointer'}}>취소</button>
    </div>
  </>;
}

function Toast({ msg }) {
  return <div style={{ position:'fixed',bottom:32,left:'50%',transform:'translateX(-50%)',background:'#06D6A0',color:'#000',padding:'10px 24px',borderRadius:50,fontWeight:700,fontSize:13,zIndex:700,animation:'toastIn 0.3s ease-out',boxShadow:'0 4px 20px rgba(6,214,160,0.4)',whiteSpace:'nowrap' }}>{msg}</div>;
}

function Confirm({ msg, onOk, onCancel, okLabel='확인' }) {
  return <>
    <div onClick={onCancel} style={{ position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:600 }} />
    <div style={{ position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'#111128',borderRadius:20,padding:28,width:'min(300px,90vw)',zIndex:601,animation:'fadeIn 0.2s' }}>
      <div style={{ color:'#fff',fontSize:14,fontWeight:600,marginBottom:24,textAlign:'center',lineHeight:1.7,whiteSpace:'pre-line' }}>{msg}</div>
      <div style={{ display:'flex',gap:10 }}>
        <button onClick={onCancel} style={{ flex:1,padding:'11px 0',borderRadius:10,border:'1px solid #2a2a3e',background:'#1a1a2e',color:'#aaa',fontWeight:700,cursor:'pointer',fontSize:13 }}>취소</button>
        <button onClick={onOk}     style={{ flex:1,padding:'11px 0',borderRadius:10,border:'none',background:'linear-gradient(135deg,#FF4D6D,#FF6B35)',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:13 }}>{okLabel}</button>
      </div>
    </div>
  </>;
}

// ── Edit Modal (with image picker + type indicator) ───────────
function EditModal({ pad, onSave, onClose }) {
  const [label,   setLabel]   = useState(pad?.label || '');
  const [vol,     setVol]     = useState(pad?.volume ?? 1);
  const [thumb,   setThumb]   = useState(pad?.thumb || null);
  const fileRef = useRef(null);

  const onFileChange = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    resizeImage(file, dataUrl => setThumb(dataUrl));
    e.target.value = '';
  };

  const typeLabel = pad?.recType === 'audio' ? '🎙 음성 녹음' : '🎬 영상 녹화';
  const typeColor = pad?.recType === 'audio' ? '#9B5DE5' : '#4CC9F0';

  return <>
    <div onClick={onClose} style={{ position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:500 }} />
    <div style={{ position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'#111128',borderRadius:20,padding:24,width:'min(320px,92vw)',zIndex:501,animation:'fadeIn 0.2s' }}>
      <div style={{ color:'#fff',fontWeight:800,fontSize:15,marginBottom:16 }}>✏️ 패드 편집</div>

      {/* Thumbnail preview + change */}
      <div style={{ display:'flex',gap:14,marginBottom:18,alignItems:'center' }}>
        <div style={{
          width:72, height:72, borderRadius:12, flexShrink:0,
          background: thumb ? `url(${thumb}) center/cover` : `${pColor(0)}22`,
          border: `1.5px solid #2a2a3e`,
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:28,
        }}>
          {!thumb && (pad?.recType==='audio' ? '🎙' : '🎬')}
        </div>
        <div style={{ flex:1 }}>
          <div style={{ color:'#666',fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:8 }}>썸네일 이미지</div>
          <button
            onClick={() => fileRef.current?.click()}
            style={{ display:'block',width:'100%',padding:'8px 0',borderRadius:8,border:'1px solid #2a2a3e',background:'#1a1a2e',color:'#aaa',fontWeight:600,cursor:'pointer',fontSize:12,marginBottom:6 }}
          >📁 이미지 변경</button>
          {thumb && (
            <button
              onClick={() => setThumb(null)}
              style={{ display:'block',width:'100%',padding:'6px 0',borderRadius:8,border:'none',background:'transparent',color:'#FF4D6D',fontWeight:600,cursor:'pointer',fontSize:11 }}
            >원래 썸네일로</button>
          )}
          <input ref={fileRef} type="file" accept="image/*" style={{ display:'none' }} onChange={onFileChange} />
        </div>
      </div>

      {/* 녹화 방식 표시 */}
      <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:16,padding:'8px 12px',background:'#0d0d1a',borderRadius:8,border:'1px solid #1e1e3a' }}>
        <span style={{ fontSize:11,color:typeColor,fontWeight:700 }}>{typeLabel}</span>
        <span style={{ fontSize:10,color:'#444',marginLeft:'auto' }}>녹화 방식 (변경불가)</span>
      </div>

      {/* 이름 */}
      <div style={{ marginBottom:16 }}>
        <div style={{ color:'#666',fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:8 }}>패드 이름</div>
        <input type="text" value={label} onChange={e=>setLabel(e.target.value)} placeholder="이름 입력..." maxLength={12} autoFocus />
      </div>

      {/* 볼륨 */}
      <div style={{ marginBottom:24 }}>
        <div style={{ display:'flex',justifyContent:'space-between',marginBottom:8 }}>
          <span style={{ color:'#666',fontSize:11,fontWeight:700,letterSpacing:1 }}>패드 볼륨</span>
          <span style={{ color:'#4CC9F0',fontSize:12,fontWeight:700 }}>{Math.round(vol*100)}%</span>
        </div>
        <input type="range" min={0} max={1} step={0.05} value={vol} onChange={e=>setVol(+e.target.value)} />
      </div>

      <div style={{ display:'flex',gap:10 }}>
        <button onClick={onClose}                         style={{ flex:1,padding:'10px 0',borderRadius:10,border:'1px solid #2a2a3e',background:'#1a1a2e',color:'#aaa',fontWeight:700,cursor:'pointer',fontSize:13 }}>취소</button>
        <button onClick={()=>onSave(label.trim(),vol,thumb)} style={{ flex:1,padding:'10px 0',borderRadius:10,border:'none',background:'linear-gradient(135deg,#4CC9F0,#4361EE)',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:13 }}>저장</button>
      </div>
    </div>
  </>;
}





// ── FilePickerModal ───────────────────────────────────────────
// "직접 녹화" vs "파일에서 불러오기" 선택
function FilePickerModal({ recType, onRecord, onFile, onClose }) {
  const fileRef = useRef(null);
  const accept  = recType === 'audio' ? 'video/*,audio/*' : 'video/*';
  const hint    = recType === 'audio'
    ? '음성 파일(.mp3, .m4a 등)을 선택하거나\n영상 파일을 선택하면 소리만 추출합니다.\n(영상에서 소리 추출 시 5분 이내 권장)'
    : '영상 파일(.mp4, .mov 등)을 선택하세요.\n파일 앱, 사진 보관함에서 불러올 수 있어요.';
  return <>
    <div onClick={onClose} style={{ position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:500 }} />
    <div style={{ position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'#111128',borderRadius:20,padding:28,width:'min(320px,92vw)',zIndex:501,animation:'fadeIn 0.2s' }}>
      <div style={{ color:'#fff',fontWeight:800,fontSize:15,marginBottom:8 }}>

// ── TrimModal ──────────────────────────────────────────────────
// 구간 선택 + 오디오 추출 / 영상 클립
function TrimModal({ file, recType, padIdx, maxRecMs, onDone, onClose }) {
  const [duration,  setDuration]  = useState(0);
  const [startSec,  setStartSec]  = useState(0);
  const [endSec,    setEndSec]    = useState(0);
  const [processing,setProcessing]= useState(false);
  const [error,     setError]     = useState(null);
  const [fileUrl,   setFileUrl]   = useState(null);
  const vidRef = useRef(null);

  useEffect(() => {
    const url = URL.createObjectURL(file);
    setFileUrl(url);
    return () => URL.revokeObjectURL(url);
  }, [file]);

  const onMeta = () => {
    const v = vidRef.current;
    if (!v) return;
    const d = Math.min(v.duration, 600); // 최대 10분 표시
    setDuration(d);
    setEndSec(Math.min(d, maxRecMs/1000)); // 기본값 = 최대 녹화 시간
  };

  const fmt = s => {
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return `${m}:${String(sec).padStart(2,'0')}`;
  };

  const readArrayBuffer = f => new Promise((res, rej) => {
    const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsArrayBuffer(f);
  });

  const handleConfirm = async () => {
    if (endSec <= startSec) { setError('끝 지점이 시작 지점보다 커야 합니다.'); return; }
    setProcessing(true); setError(null);
    try {
      if (recType === 'audio') {
        const arrayBuf = await readArrayBuffer(file);
        const AC = window.AudioContext || window.webkitAudioContext;
        const ctx = new AC();
        let decoded;
        try {
          decoded = await ctx.decodeAudioData(arrayBuf);
        } catch(decodeErr) {
          await ctx.close();
          setError('이 파일 형식은 소리 추출을 지원하지 않습니다.');
          setProcessing(false);
          return;
        }
        const sampleRate = decoded.sampleRate;
        const startSample = Math.floor(startSec * sampleRate);
        const endSample   = Math.floor(endSec   * sampleRate);
        const length = endSample - startSample;
        const trimmed = ctx.createBuffer(decoded.numberOfChannels, length, sampleRate);
        for (let ch = 0; ch < decoded.numberOfChannels; ch++) {
          trimmed.copyToChannel(decoded.getChannelData(ch).slice(startSample, endSample), ch);
        }
        const wav = audioBufferToWav(trimmed);
        const blob = new Blob([wav], { type:'audio/wav' });
        await ctx.close();
        onDone(blob, 'audio');
      } else {
        onDone(file, 'video', startSec, endSec);
      }
    } catch(e) {
      console.error(e);
      setError('처리 중 오류가 발생했습니다. 파일을 확인해 주세요.');
      setProcessing(false);
    }
  };

  return <>
    <div onClick={!processing ? onClose : null} style={{ position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:510 }} />
    <div style={{ position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'#111128',borderRadius:20,padding:24,width:'min(360px,95vw)',zIndex:511,animation:'fadeIn 0.2s' }}>
      <div style={{ color:'#fff',fontWeight:800,fontSize:15,marginBottom:16 }}>✂️ 구간 선택</div>

      {/* 미리보기 */}
      {fileUrl && (
        <video ref={vidRef} src={fileUrl} controls playsInline muted={recType==='video'}
          onLoadedMetadata={onMeta}
          style={{ width:'100%',borderRadius:10,background:'#000',marginBottom:16,maxHeight:160,objectFit:'contain' }} />
      )}

      {duration > 0 && <>
        {/* 안내 */}
        <div style={{ color:'#555',fontSize:11,marginBottom:12,lineHeight:1.6 }}>
          {recType==='audio'
            ? `선택한 구간의 소리만 추출합니다. (최대 ${maxRecMs/1000}초까지 선택 가능)`
            : `선택한 구간을 패드에 저장합니다. 재생 시 해당 구간만 재생됩니다. (최대 ${maxRecMs/1000}초까지 선택 가능)`}
        </div>

        {/* 시작 슬라이더 */}
        <div style={{ marginBottom:14 }}>
          <div style={{ display:'flex',justifyContent:'space-between',marginBottom:6 }}>
            <span style={{ color:'#aaa',fontSize:12 }}>시작</span>
            <span style={{ color:'#4CC9F0',fontSize:12,fontWeight:700 }}>{fmt(startSec)}</span>
          </div>
          <input type="range" min={0} max={duration} step={0.1} value={startSec}
            onChange={e=>{ const v=+e.target.value; setStartSec(v); setEndSec(Math.min(duration, v+maxRecMs/1000)); }} />
        </div>

        {/* 끝 슬라이더 */}
        <div style={{ marginBottom:8 }}>
          <div style={{ display:'flex',justifyContent:'space-between',marginBottom:6 }}>
            <span style={{ color:'#aaa',fontSize:12 }}>끝</span>
            <span style={{ color:'#FF6B35',fontSize:12,fontWeight:700 }}>{fmt(endSec)}</span>
          </div>
          <input type="range" min={0} max={duration} step={0.1} value={endSec}
            onChange={e=>{ const v=+e.target.value; const clamped=Math.min(v, startSec+maxRecMs/1000); setEndSec(Math.max(clamped, startSec+0.1)); }} />
        </div>

        {/* 구간 길이 */}
        <div style={{ textAlign:'center',color:'#555',fontSize:11,marginBottom:16 }}>
          선택 구간: <span style={{ color:'#fff',fontWeight:700 }}>{fmt(endSec - startSec)}</span>
        </div>
      </>}

      {error && <div style={{ color:'#FF4D6D',fontSize:12,marginBottom:12,textAlign:'center' }}>{error}</div>}

      <div style={{ display:'flex',gap:10 }}>
        <button onClick={onClose} disabled={processing} style={{ flex:1,padding:'11px 0',borderRadius:10,border:'1px solid #2a2a3e',background:'#1a1a2e',color:'#aaa',fontWeight:700,cursor:'pointer',fontSize:13 }}>취소</button>
        <button onClick={handleConfirm} disabled={processing||duration===0} style={{ flex:1,padding:'11px 0',borderRadius:10,border:'none',background:'linear-gradient(135deg,#4CC9F0,#4361EE)',color:processing?'rgba(255,255,255,0.5)':'#fff',fontWeight:700,cursor:processing?'default':'pointer',fontSize:13 }}>
          {processing ? '처리 중...' : '확인'}
        </button>
      </div>
    </div>
  </>;
}

// WAV encoder (PCM)
function audioBufferToWav(buffer) {
  const numCh = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const numSamples = buffer.length;
  const bytesPerSample = 2;
  const blockAlign = numCh * bytesPerSample;
  const byteRate = sampleRate * blockAlign;
  const dataSize = numSamples * blockAlign;
  const ab = new ArrayBuffer(44 + dataSize);
  const view = new DataView(ab);
  const str = (off, s) => { for(let i=0;i<s.length;i++) view.setUint8(off+i, s.charCodeAt(i)); };
  str(0,'RIFF'); view.setUint32(4, 36+dataSize, true); str(8,'WAVE');
  str(12,'fmt '); view.setUint32(16,16,true); view.setUint16(20,1,true);
  view.setUint16(22,numCh,true); view.setUint32(24,sampleRate,true);
  view.setUint32(28,byteRate,true); view.setUint16(32,blockAlign,true);
  view.setUint16(34,bytesPerSample*8,true); str(36,'data'); view.setUint32(40,dataSize,true);
  let off = 44;
  for (let i=0;i<numSamples;i++) {
    for (let ch=0;ch<numCh;ch++) {
      const s = Math.max(-1,Math.min(1,buffer.getChannelData(ch)[i]));
      view.setInt16(off, s<0?s*0x8000:s*0x7FFF, true); off+=2;
    }
  }
  return ab;
}

  const loadList = async () => {
    const list = await dbGet('cfg_list') || [];

  };

  const hDown = e => { dg.current={on:true,y0:e.clientY||e.touches?.[0]?.clientY||0,dy:0}; };

// ── Settings ──────────────────────────────────────────────────
function Settings({ open, onClose, cfg, set, onReset }) {
  const dg = useRef({on:false,y0:0,dy:0});
  const [ty, setTy] = useState(0);
  useEffect(() => { if (open) setTy(0); }, [open]);
  const hDown = e => { dg.current={on:true,y0:e.clientY||e.touches?.[0]?.clientY||0,dy:0}; };
  const hMove = e => { if(!dg.current.on) return; const y=Math.max(0,(e.clientY||e.touches?.[0]?.clientY||0)-dg.current.y0); dg.current.dy=y; setTy(y); };
  const hUp   = () => { if(!dg.current.on) return; dg.current.on=false; if(dg.current.dy>120){onClose();setTy(0);}else setTy(0); };
  if (!open) return null;
  const { cols, rows, maxRecMs, globalVolume, cameraFacing, defaultRecType } = cfg;
  const sBtn = a => ({ flex:1,padding:'8px 0',borderRadius:8,border:'none',cursor:'pointer',fontWeight:700,fontSize:12,background:a?'#4CC9F0':'#1A1A2E',color:a?'#000':'#555' });
  const stBtn = d => ({ width:36,height:36,borderRadius:8,border:'1px solid #2a2a3e',background:'#1A1A2E',color:d?'#333':'#fff',fontSize:20,cursor:d?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center' });
  const sec = { color:'#666',fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:10 };
  const row = { display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20 };
  const num = { color:'#fff',fontWeight:800,fontSize:18,minWidth:36,textAlign:'center' };
  return <>
    <div onClick={onClose} style={{ position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:200 }} />
    <div onMouseMove={hMove} onMouseUp={hUp} onTouchMove={hMove} onTouchEnd={hUp}
      style={{ position:'fixed',bottom:0,left:0,right:0,background:'#111128',borderRadius:'20px 20px 0 0',zIndex:201,animation:ty===0?'slideUp 0.25s ease-out':'none',transform:`translateY(${ty}px)`,transition:dg.current.on?'none':'transform 0.25s ease-out',maxHeight:'calc(100dvh - 100px)',display:'flex',flexDirection:'column' }}>
      {/* 고정 헤더 */}
      <div style={{ flexShrink:0,background:'#111128',borderRadius:'20px 20px 0 0',padding:'0 24px 0' }}>
        <div onMouseDown={hDown} onTouchStart={hDown} style={{ width:'100%',padding:'16px 0 14px',cursor:'grab',touchAction:'none' }}>
          <div style={{ width:40,height:4,background:'#555',borderRadius:2,margin:'0 auto' }} />
        </div>
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:20 }}>
          <span style={{ color:'#fff',fontWeight:800,fontSize:16 }}>⚙️ 환경설정</span>
          <button onClick={onClose} style={{ width:32,height:32,borderRadius:'50%',border:'1px solid #2a2a3e',background:'#1a1a2e',color:'#aaa',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>✕</button>
        </div>
      </div>
      {/* 스크롤 영역 */}
      <div style={{ overflowY:'auto',flex:1,padding:'0 24px 44px' }}>

      {/* 기록 방식 */}
      <div style={{ marginBottom:24 }}>
        <div style={sec}>기본 기록 방식</div>
        <div style={{ display:'flex',gap:8 }}>
          <button style={sBtn(defaultRecType==='video')} onClick={()=>set('defaultRecType','video')}>🎬 영상 녹화</button>
          <button style={sBtn(defaultRecType==='audio')} onClick={()=>set('defaultRecType','audio')}>🎙 음성 녹음</button>
        </div>
        <div style={{ color:'#444',fontSize:11,marginTop:8 }}>{defaultRecType==='audio' ? '새 패드 녹음 시 기본 방식' : '새 패드 녹화 시 기본 방식'}</div>
      </div>

      {/* 버튼 배치 */}
      <div style={{ marginBottom:24 }}>
        <div style={sec}>버튼 배치</div>
        <div style={row}>
          <span style={{ color:'#aaa',fontSize:13 }}>가로 열 수</span>
          <div style={{ display:'flex',alignItems:'center',gap:12 }}>
            <button style={stBtn(cols<=1)} onClick={()=>cols>1&&set('cols',cols-1)}>−</button>
            <span style={num}>{cols}</span>
            <button style={stBtn(cols>=8)} onClick={()=>cols<8&&set('cols',cols+1)}>+</button>
          </div>
        </div>
        <div style={{ ...row,marginBottom:0 }}>
          <span style={{ color:'#aaa',fontSize:13 }}>세로 행 수</span>
          <div style={{ display:'flex',alignItems:'center',gap:12 }}>
            <button style={stBtn(rows<=1)} onClick={()=>rows>1&&set('rows',rows-1)}>−</button>
            <span style={num}>{rows}</span>
            <button style={stBtn(rows>=6)} onClick={()=>rows<6&&set('rows',rows+1)}>+</button>
          </div>
        </div>
        <div style={{ color:'#444',fontSize:11,textAlign:'right',marginTop:8 }}>총 {cols*rows}개 패드</div>
      </div>

      {/* 녹화 시간 */}
      <div style={{ marginBottom:24 }}>
        <div style={sec}>{defaultRecType==='audio' ? '최대 녹음 시간' : '최대 녹화 시간'}</div>
        <div style={{ display:'flex',gap:8 }}>
          {[1000,3000,5000].map(ms=><button key={ms} style={sBtn(maxRecMs===ms)} onClick={()=>set('maxRecMs',ms)}>{ms/1000}초</button>)}
        </div>
      </div>

      {/* 전체 볼륨 */}
      <div style={{ marginBottom:24 }}>
        <div style={{ display:'flex',justifyContent:'space-between',marginBottom:10 }}>
          <span style={sec}>전체 볼륨</span>
          <span style={{ color:'#4CC9F0',fontSize:12,fontWeight:700 }}>{Math.round(globalVolume*100)}%</span>
        </div>
        <input type="range" min={0} max={1} step={0.05} value={globalVolume} onChange={e=>set('globalVolume',+e.target.value)} />
      </div>

      {/* 카메라 (영상 모드일 때만 관련) */}
      <div style={{ marginBottom:32 }}>
        <div style={sec}>카메라 방향</div>
        <div style={{ display:'flex',gap:8 }}>
          <button style={sBtn(cameraFacing==='user')}        onClick={()=>set('cameraFacing','user')}>📱 전면</button>
          <button style={sBtn(cameraFacing==='environment')} onClick={()=>set('cameraFacing','environment')}>📷 후면</button>
        </div>
      </div>

      <button onClick={onReset} style={{ width:'100%',padding:'14px 0',borderRadius:12,border:'none',background:'#2a0a0a',color:'#FF4D6D',fontWeight:700,fontSize:14,cursor:'pointer' }}>
        🗑 전체 초기화
      </button>
      </div>{/* end scroll area */}
    </div>
  </>;
}

        };
        v.onerror = resolve;
      });
    }

    const newPad = { url, thumb, label:old?.label||'', volume:old?.volume??1, recType,
      ...(startSec !== undefined ? { trimStart:startSec, trimEnd:endSec } : {}) };
    const np = [...padsRef.current]; np[idx] = newPad;
    padsRef.current = np; setPads([...np]);

    if (recType === 'audio') {
      setThumbPrompt({ idx, pad: newPad });
    } else {
      autoSave(np);
      showToast('✅ 파일을 불러왔습니다');
    }
  };

  // ── Drag & Drop ───────────────────────────────────────────────
  const handleGlobalMove = e => {
    if (dragActiveRef.current) {
      if (ghostRef.current) {
        ghostRef.current.style.left = (e.clientX-40)+'px';
        ghostRef.current.style.top  = (e.clientY-40)+'px';
      }
      const el  = document.elementFromPoint(e.clientX, e.clientY);
      const pidx = el?.closest('[data-pi]') ? parseInt(el.closest('[data-pi]').dataset.pi) : null;
      setDragTo(pidx !== dragFrom ? pidx : null);
      return;
    }
    if (pressRef.current) {
      const dx = Math.abs(e.clientX - pressRef.current.x0);
      const dy = Math.abs(e.clientY - pressRef.current.y0);
      if (dx>8||dy>8) { clearTimeout(pressRef.current.timer); pressRef.current=null; }
    }
  };

  const handleGlobalUp = e => {
    if (dragActiveRef.current) {
      const el   = document.elementFromPoint(e.clientX, e.clientY);
      const pidx = el?.closest('[data-pi]') ? parseInt(el.closest('[data-pi]').dataset.pi) : null;
      if (pidx !== null && pidx !== dragFrom) {
        const np = [...padsRef.current];
        [np[dragFrom], np[pidx]] = [np[pidx], np[dragFrom]];
        padsRef.current = np; setPads([...np]); autoSave(np, true);
      }
      dragActiveRef.current = false;
      try { e.target.releasePointerCapture?.(e.pointerId); } catch {}
      if (ghostRef.current) ghostRef.current.style.display = 'none';
      setDragFrom(null); setDragTo(null); pressRef.current = null;
      return;
    }
    if (pressRef.current) {
      const {idx} = pressRef.current;
      clearTimeout(pressRef.current.timer); pressRef.current = null;
      if (recIdx !== null) return;
      if (padsRef.current[idx]) {
        setConfirm({ msg: defRecTypeRef.current==='audio' ? '패드를 다시 녹음할까요?\n기존 녹음이 삭제됩니다.' : '패드를 다시 녹화할까요?\n기존 녹화가 삭제됩니다.', onOk:()=>{ setConfirm(null); setFilePicker({idx}); } });
      } else {
        setFilePicker({idx});
      }
    }
  };

  const handlePadDown = (e, idx) => {
    if (mode==='play') { playPad(idx); return; }
    if (recIdx !== null) return;
    const x0=e.clientX, y0=e.clientY;
    const timer = setTimeout(() => {
      dragActiveRef.current = true; setDragFrom(idx);
      if (ghostRef.current) {
        const p = padsRef.current[idx];
        ghostRef.current.style.display = 'block';
        ghostRef.current.style.left = (x0-40)+'px';
        ghostRef.current.style.top  = (y0-40)+'px';
        ghostRef.current.style.background = p?.thumb ? `url(${p.thumb}) center/cover` : `${pColor(idx)}44`;
        ghostRef.current.style.borderColor = pColor(idx);
      }
      navigator.vibrate?.(50); pressRef.current = null;
    }, 450);
    pressRef.current = {idx, timer, x0, y0};
  };

  const total = cols * rows;
  if (loading) return <div style={{ height:'100dvh',display:'flex',alignItems:'center',justifyContent:'center',color:'#555',fontSize:14 }}>불러오는 중...</div>;

  return (
    <div ref={containerRef} onPointerMove={handleGlobalMove} onPointerUp={handleGlobalUp} onPointerCancel={handleGlobalUp}
      style={{ height:'100dvh',display:'flex',flexDirection:'column',alignItems:'center',padding:'0 12px 0',overflow:'hidden' }}>

      {/* Header */}
      <div ref={headerRef} style={{ width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 0 12px',gap:8,flexShrink:0 }}>
        <div>
          <div style={{ color:'#fff',fontSize:18,fontWeight:800,letterSpacing:-0.5 }}>
            🎓 클래스 패드 <span style={{ fontSize:11,color:'#4CC9F0',fontWeight:700,verticalAlign:'middle' }}>Beta</span>
          </div>
          <div style={{ color:'#555',fontSize:10,marginTop:2 }}>
            {mode==='record' ? (dragFrom!==null ? '놓을 위치로 이동' : `탭: ${defaultRecType==='audio'?'🎙 녹음':'🎬 녹화'} | 꾹: 순서 변경`) : '패드를 눌러 재생'}
          </div>
        </div>
        <div style={{ display:'flex',gap:7,alignItems:'center' }}>
          <button onClick={()=>setShowConfig(true)} style={{ width:38,height:38,borderRadius:10,border:'1px solid #2a2a3e',background:'#1A1A2E',color:'#aaa',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>📂</button>
          <button onClick={()=>setShowHelp(true)} style={{ width:38,height:38,borderRadius:10,border:'1px solid #2a2a3e',background:'#1A1A2E',color:'#aaa',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>❓</button>
          <button onClick={()=>setShowSettings(true)} style={{ width:38,height:38,borderRadius:10,border:'1px solid #2a2a3e',background:'#1A1A2E',color:'#aaa',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>⚙️</button>
          <button onClick={gazeMode ? stopGaze : startGaze} style={{ width:38,height:38,borderRadius:10,border:`1px solid ${gazeMode?'#4CC9F0':'#2a2a3e'}`,background:gazeMode?'rgba(76,201,240,0.15)':'#1A1A2E',color:gazeMode?'#4CC9F0':'#aaa',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:gazeMode?'0 0 12px rgba(76,201,240,0.3)':'none' }} title="시선 트래킹">👁️</button>
          <button onClick={()=>setMode(m=>m==='play'?'record':'play')} style={{ height:38,padding:'0 14px',borderRadius:50,border:'none',background:mode==='record'?'linear-gradient(135deg,#FF4D6D,#FF6B35)':'linear-gradient(135deg,#06D6A0,#4CC9F0)',color:'#fff',fontWeight:700,fontSize:12,cursor:'pointer',boxShadow:mode==='record'?'0 0 16px rgba(255,77,109,0.5)':'0 0 16px rgba(6,214,160,0.4)' }}>
            {mode==='record' ? (defaultRecType==='audio' ? '🎙 녹음' : '🔴 녹화') : '▶ 재생'}
          </button>
        </div>
      </div>

      {/* Grid */}
      <div style={{ display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`,gap:GAP,width:gridWidth,flexShrink:0 }}>
        {Array.from({length:total},(_,i) => {
          const pad=pads[i], isRec=recIdx===i, playKey=playKeys[i], isPlay=!!playKey;
          const color=pColor(i), vol=(pad?.volume??1)*globalVolume;
          const isDragFrom=dragFrom===i, isDragTo=dragTo===i;
          const isAudio = pad?.recType === 'audio';
          return (
            <div key={i} data-pi={i} onPointerDown={e=>handlePadDown(e,i)} style={{
              aspectRatio:'1',borderRadius:16,
              background: pad?.thumb&&!(isPlay&&!isAudio)&&!isDragFrom ? `url(${pad.thumb}) center/cover` : `${color}22`,
              border: isDragTo?`2.5px solid #fff`:isRec?`2.5px solid #FF4D6D`:isPlay?`2.5px solid ${color}`:`2px solid ${color}44`,
              display:'flex',alignItems:'center',justifyContent:'center',
              cursor:'pointer',position:'relative',overflow:'hidden',
              transition:'transform 0.08s,box-shadow 0.08s,opacity 0.12s',
              transform:isPlay?'scale(0.93)':isDragFrom?'scale(0.85)':'scale(1)',
              opacity:isDragFrom?0.35:1,
              boxShadow:isDragTo?'0 0 28px rgba(255,255,255,0.5)':isPlay?`0 0 28px ${color}aa`:isRec?'0 0 24px rgba(255,77,109,0.6)':'none',
              touchAction:'none',
            }}>
              {/* Playback */}
              {pad&&isPlay&&(
                isAudio
                  ? <PadAudio key={playKey} url={pad.url} volume={vol} onEnd={()=>stopPad(i)} />
                  : <PadVideo key={playKey} url={pad.url} volume={vol} onEnd={()=>stopPad(i)} trimStart={pad.trimStart} trimEnd={pad.trimEnd} />
              )}

              {/* Play glow */}
              {isPlay&&<div style={{ position:'absolute',inset:0,zIndex:2,pointerEvents:'none',background:`linear-gradient(to top,${color}55 0%,transparent 60%)`,borderRadius:14 }} />}

              {/* Empty state */}
              {!pad&&(
                <div style={{ textAlign:'center',position:'relative',zIndex:2 }}>
                  <div style={{ fontSize:cols>=6?20:30 }}>{pEmoji(i)}</div>
                  {mode==='record'&&<div style={{ color,fontSize:cols>=6?10:12,fontWeight:700,marginTop:3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:'90%' }}>
                    {defaultRecType==='audio'?'🎙 탭하여 녹음':'🎬 탭하여 녹화'}
                  </div>}
                </div>
              )}

              {/* Gradient overlay */}
              {pad&&!isPlay&&!isRec&&<div style={{ position:'absolute',inset:0,zIndex:2,background:'linear-gradient(to top,rgba(0,0,0,0.55) 0%,transparent 55%)',borderRadius:14 }} />}

              {/* Dwell ring (gaze dwell 게이지) */}
              {gazeMode&&pad&&(
                <div className="dwell-ring">
                  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle id={`dwell-arc-${i}`} className="dwell-arc"
                      cx="50" cy="50" r="40"
                      fill="none" stroke="#4CC9F0" strokeWidth="5"
                      strokeDasharray="0 999" strokeLinecap="round"
                      transform="rotate(-90 50 50)"
                      style={{opacity:0.85}}
                    />
                  </svg>
                </div>
              )}

              {/* Audio playing wave indicator */}
              {pad&&isPlay&&isAudio&&(
                <div style={{ position:'absolute',inset:0,zIndex:3,display:'flex',alignItems:'center',justifyContent:'center',gap:3 }}>
                  {[0,80,160,240,320].map(d=>(
                    <div key={d} style={{ width:4,borderRadius:2,background:color,animation:`wave 0.8s ease-in-out ${d}ms infinite` }} />
                  ))}
                </div>
              )}

              {/* Audio badge on pad */}
              {pad&&isAudio&&!isPlay&&!isRec&&(
                <div style={{ position:'absolute',bottom:pad?.label?22:6,right:6,zIndex:4,background:'rgba(0,0,0,0.7)',borderRadius:10,padding:'2px 5px',fontSize:9,color:'#9B5DE5',fontWeight:700 }}>🎙</div>
              )}

              {/* REC badge */}
              {isRec&&(
                <div style={{ position:'absolute',top:6,left:6,zIndex:5,display:'flex',alignItems:'center',gap:3,background:'rgba(0,0,0,0.8)',borderRadius:20,padding:'2px 7px' }}>
                  <div style={{ width:6,height:6,borderRadius:'50%',background:'#FF4D6D',animation:'blink 0.5s alternate infinite' }} />
                  <span style={{ color:'#FF4D6D',fontSize:9,fontWeight:700 }}>REC</span>
                </div>
              )}

              {/* Record mode controls */}
              {pad&&mode==='record'&&!isRec&&!isDragFrom&&(
                <>
                  <button onPointerDown={e=>deletePad(e,i)} style={{ position:'absolute',top:5,right:5,zIndex:10,width:28,height:28,borderRadius:'50%',background:'rgba(0,0,0,0.8)',border:'none',color:'#fff',fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>✕</button>
                  <button onPointerDown={e=>openEdit(e,i)}  style={{ position:'absolute',top:5,left:5,zIndex:10,width:28,height:28,borderRadius:'50%',background:'rgba(0,0,0,0.8)',border:'none',color:'#4CC9F0',fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>✏️</button>
                </>
              )}

              {/* Label */}
              {pad?.label&&!isRec&&!isDragFrom&&(
                <div style={{ position:'absolute',bottom:0,left:0,right:0,zIndex:3,padding:'4px 6px',textAlign:'center',color:'#fff',fontSize:cols>=6?13:17,fontWeight:700,textShadow:'0 1px 4px rgba(0,0,0,0.8)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis' }}>{pad.label}</div>
              )}
            </div>
          );
        })}
      </div>

      {/* Drag Ghost */}
      <div ref={ghostRef} style={{ display:'none',position:'fixed',width:80,height:80,borderRadius:14,border:'2px solid #fff',opacity:0.85,pointerEvents:'none',zIndex:999,backgroundSize:'cover',backgroundPosition:'center' }} />

      {/* Recording Modal */}
      {camReady&&(
        <div style={{ position:'fixed',inset:0,background:'rgba(0,0,0,0.93)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:300,gap:14 }}>
          <div style={{ color:countdown!==null?'#4CC9F0':'#FF4D6D',fontWeight:800,fontSize:14,letterSpacing:2 }}>
            {countdown!==null ? (currentRecType==='audio'?'녹음 준비...':'녹화 준비...') : (currentRecType==='audio'?'🎙 녹음 중':'🔴 녹화 중')}
          </div>

          {/* Video preview (video mode only) */}
          {currentRecType === 'video' && (
            <div style={{ position:'relative',width:280,height:210 }}>
              <video ref={camVidRef} muted autoPlay playsInline style={{
                width:'100%',height:'100%',borderRadius:16,
                border:`2px solid ${countdown!==null?'#4CC9F0':'#FF4D6D'}`,
                background:'#000',objectFit:'cover',
                boxShadow:`0 0 40px ${countdown!==null?'rgba(76,201,240,0.4)':'rgba(255,77,109,0.4)'}`,
                transform:cameraFacing==='user'?'scaleX(-1)':'none',
              }} />
              {countdown!==null&&(
                <div style={{ position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.3)',borderRadius:14 }}>
                  <div key={countdown} style={{ fontSize:88,fontWeight:900,color:'#fff',textShadow:'0 0 40px rgba(76,201,240,0.9)',position:'absolute',top:'50%',left:'50%',animation:'countPop 0.7s ease-out forwards' }}>
                    {countdown}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Audio mode UI */}
          {currentRecType === 'audio' && (
            <div style={{ width:200,height:120,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16 }}>
              {countdown!==null ? (
                <div key={countdown} style={{ fontSize:88,fontWeight:900,color:'#4CC9F0',textShadow:'0 0 40px rgba(76,201,240,0.9)',animation:'countPop 0.7s ease-out forwards' }}>
                  {countdown}
                </div>
              ) : (
                <>
                  <div style={{ fontSize:56,animation:'pulse 1s ease-in-out infinite' }}>🎙</div>
                  <div style={{ display:'flex',alignItems:'flex-end',gap:4,height:40 }}>
                    {[0,120,240,360,480].map(d=>(
                      <div key={d} style={{ width:6,borderRadius:3,background:'#9B5DE5',animation:`wave 0.8s ease-in-out ${d}ms infinite` }} />
                    ))}
                  </div>
                </>
              )}
            </div>
          )}

          {countdown===null&&(
            <>
              <div style={{ width:280,height:5,background:'#222',borderRadius:3,overflow:'hidden' }}>
                <div style={{ height:'100%',width:`${recProg*100}%`,background: currentRecType==='audio'?'linear-gradient(90deg,#9B5DE5,#F72585)':'linear-gradient(90deg,#FF4D6D,#FF6B35)',borderRadius:3,transition:'width 0.1s linear' }} />
              </div>
              <div style={{ color:'#555',fontSize:11 }}>{maxRecMs/1000}초 최대 · 완료 후 자동 저장</div>
              <button onClick={stopRecord} style={{ padding:'12px 32px',borderRadius:50,border:'none',background: currentRecType==='audio'?'linear-gradient(135deg,#9B5DE5,#F72585)':'linear-gradient(135deg,#FF4D6D,#FF6B35)',color:'#fff',fontWeight:800,fontSize:14,cursor:'pointer',boxShadow:'0 0 24px rgba(255,77,109,0.5)' }}>
                ⏹ {currentRecType==='audio'?'녹음 완료':'녹화 완료'}
              </button>
            </>
          )}
          <button onClick={cancelRecordFlow} style={{ background:'none',border:'none',color:'#555',fontSize:13,cursor:'pointer' }}>취소</button>
        </div>
      )}

      <ConfigPanel open={showConfig} onClose={()=>setShowConfig(false)} onSave={handleSaveConfig} onLoad={handleLoadConfig} onDeleteCfg={handleDeleteConfig} />
      {filePicker&&<FilePickerModal recType={defaultRecType} onRecord={()=>{ setFilePicker(null); startRecordFlow(filePicker.idx); }} onFile={f=>handleFileSelected(f, filePicker.idx)} onClose={()=>setFilePicker(null)} />}
      {trimModal&&<TrimModal file={trimModal.file} recType={defaultRecType} padIdx={trimModal.idx} maxRecMs={maxRecMs} onDone={handleTrimDone} onClose={()=>setTrimModal(null)} />}
      {thumbPrompt&&<ThumbPromptModal padIdx={thumbPrompt.idx} currentThumb={thumbPrompt.pad.thumb} onSave={handleThumbSave} onSkip={handleThumbSkip} />}
      <HelpPanel open={showHelp} onClose={()=>setShowHelp(false)} />
      <Settings open={showSettings} onClose={()=>setShowSettings(false)} cfg={{cols,rows,maxRecMs,globalVolume,cameraFacing,defaultRecType}} set={setSetting} onReset={handleReset} />
      {editPad&&<EditModal pad={pads[editPad.idx]} onSave={saveEdit} onClose={()=>setEditPad(null)} />}
      {confirm&&<Confirm msg={confirm.msg} onOk={confirm.onOk} onCancel={()=>setConfirm(null)} />}
      {toast&&<Toast msg={toast} />}
      {gazeStartModal&&<GazeStartModal savedAt={gazeStartModal.savedAt} screenW={gazeStartModal.screenW} screenH={gazeStartModal.screenH} onNew={handleGazeNewCalib} onLoad={handleGazeLoadSaved} onDelete={handleGazeDeleteSaved} onCancel={()=>setGazeStartModal(null)} />}
      {gazeLoading&&<GazeLoadingScreen onCancel={stopGaze} />}
      {gazeCalib&&<CalibrationScreen onDone={handleGazeCalibDone} onCancel={stopGaze} onCalibClick={(x,y)=>{ calibPtsRef.current.push([x,y]); }} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
